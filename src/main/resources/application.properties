# App
spring.application.name=edumetrix
server.port=${PORT:8080}

# MySQL Config
spring.datasource.url=jdbc:mysql://${DB_HOST:${MYSQLHOST:127.0.0.1}}:${DB_PORT:${MYSQLPORT:3306}}/${DB_NAME:${MYSQLDATABASE:edumetrix}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:ritheshmac}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ✅ IMPORTANT FIX (this was missing)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Auth
app.auth.secret=${AUTH_SECRET:replace-this-secret-before-production}