# Project note: This file defines the Render deployment for the Java Spring Boot version of EduMetrix.
# It builds the Maven project and starts the generated Spring Boot jar with MySQL-backed environment variables.
services:
  - type: web
    name: edumetrix-java
    runtime: java
    plan: starter
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/edumetrix-0.0.1-SNAPSHOT.jar
    envVars:
      - key: AUTH_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
